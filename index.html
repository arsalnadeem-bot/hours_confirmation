<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hours Confirmation</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>

body{
  margin:0;
  padding:40px 16px;
  background:#f5efe6;
  font-family:'DM Sans',sans-serif;
}

.btn-approve,
.btn-revise{
  display:inline-block;
  padding:14px 32px;
  border-radius:50px;
  font-size:13px;
  letter-spacing:0.08em;
  text-decoration:none;
  border:none;
  cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:all .2s ease;
}

.btn-approve{
  background:#d06b43;
  color:#fff;
  font-weight:500;
  box-shadow:0 4px 16px rgba(208,107,67,0.3);
}

.btn-approve:hover{
  background:#b85530;
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(208,107,67,0.45);
}

.btn-revise{
  background:#fff;
  color:#633841;
  border:1.5px solid #e4d4b8;
}

.btn-revise:hover{
  background:#f5efe6;
  border-color:#c8a878;
  transform:translateY(-2px);
}

.btn-submit{
  margin-top:12px;
  display:inline-block;
  background:#633841;
  color:#fff;
  border:none;
  border-radius:50px;
  padding:12px 28px;
  font-family:'DM Sans',sans-serif;
  font-size:12px;
  font-weight:500;
  letter-spacing:0.1em;
  cursor:pointer;
  transition:all .2s ease;
}

.btn-submit:hover{
  background:#8b4a36;
  transform:translateY(-1px);
}

.textarea-field{
  width:100%;
  box-sizing:border-box;
  border:1.5px solid #e4d4b8;
  border-radius:14px;
  padding:12px 16px;
  font-family:'DM Sans',sans-serif;
  font-size:13px;
  color:#633841;
  resize:none;
  outline:none;
  background:#fdfaf6;
}

.textarea-field:focus{
  border-color:#c05a30;
}

.status-badge{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:14px 28px;
  border-radius:50px;
  font-size:13px;
  font-weight:500;
  letter-spacing:0.06em;
  animation:popIn .3s cubic-bezier(0.34,1.56,0.64,1) both;
}

.badge-approved{
  background:#d06b43;
  color:#fff;
}

.badge-revision{
  background:#f5efe6;
  color:#633841;
  border:1.5px solid #e4d4b8;
}

@keyframes popIn{
  from{
    opacity:0;
    transform:scale(.8);
  }
  to{
    opacity:1;
    transform:scale(1);
  }
}

#state-approved,
#state-revision{
  display:none;
}

</style>
</head>

<body>

<!-- Hidden Metadata -->
<div id="meta" data-task-id="" style="display:none;"></div>

<div style="max-width:500px;margin:auto;background:#fff;border-radius:28px;overflow:hidden;box-shadow:0 8px 48px rgba(99,56,65,0.10);">

  <!-- Header -->
  <div style="background:#633841;padding:36px 36px 28px;">

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">
      <div style="width:36px;height:41px;background:linear-gradient(135deg,#e8845a,#c05a30);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);"></div>

      <span style="font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:#e4d4b8;font-weight:500;">
        Hours Confirmation
      </span>
    </div>

    <div style="font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;color:#fff;line-height:1.15;">
      Weekly<br/>Review
    </div>

    <div style="width:36px;height:2px;background:#d06b43;margin-top:14px;border-radius:2px;"></div>

  </div>

  <!-- Body -->
  <div style="padding:36px 36px 28px;">

    <!-- Employee Message -->
    <p style="margin:0 0 22px;font-size:15px;color:#633841;font-weight:300;line-height:1.7;border-left:3px solid #e4d4b8;padding-left:14px;">
      Hi <span id="employee-name"></span>, please review your logged hours for the selected payroll cycle and confirm below.
    </p>

    <!-- Date Range -->
    <div style="text-align:center;margin-bottom:32px;">
      <span id="period-range" style="display:inline-block;background:#f5efe6;border:1px solid #e4d4b8;border-radius:40px;padding:6px 18px;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:#a0927c;font-weight:500;">
      </span>
    </div>

    <!-- Hexagon -->
    <div style="text-align:center;margin:0 0 36px;">

      <div style="width:160px;height:185px;background:linear-gradient(160deg,#e8845a 0%,#c05a30 100%);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:inline-flex;align-items:center;justify-content:center;flex-direction:column;">

        <div id="days-count" style="font-family:'Cormorant Garamond',serif;font-size:72px;font-weight:600;color:#fff;line-height:1;">
          0
        </div>

        <div style="font-size:10px;letter-spacing:0.22em;color:rgba(255,255,255,0.75);text-transform:uppercase;margin-top:4px;">
          days
        </div>

      </div>

    </div>

    <div style="border-top:1px solid #f0e8dc;margin-bottom:28px;"></div>

    <!-- DEFAULT -->
    <div id="state-default" style="text-align:center;">

      <button class="btn-approve" onclick="handleApprove()">
        Approve
      </button>

      <button class="btn-revise" onclick="handleRevise()" style="margin-left:10px;">
        Request Revision
      </button>

    </div>

    <!-- APPROVED -->
    <div id="state-approved" style="text-align:center;">

      <div class="status-badge badge-approved">
        ✓ Hours Approved
      </div>

      <p style="margin:16px 0 0;font-size:12px;color:#a0927c;">
        Your confirmation has been recorded.
      </p>

    </div>

    <!-- REVISION -->
    <div id="state-revision">

      <p style="margin:0 0 10px;font-size:13px;color:#633841;font-weight:500;">
        What needs to be corrected?
      </p>

      <textarea
        id="revision-note"
        class="textarea-field"
        rows="3"
        placeholder="Describe the discrepancy..."
      ></textarea>

      <div style="text-align:center;">

        <button class="btn-submit" onclick="handleSubmitRevision()">
          Submit Request
        </button>

        <button
          onclick="handleCancel()"
          style="display:block;margin:10px auto 0;background:none;border:none;font-size:11px;color:#a0927c;cursor:pointer;"
        >
          Cancel
        </button>

      </div>

    </div>

    <!-- Footer Text -->
    <p style="margin:24px 0 0;font-size:11px;color:#c0b0a0;text-align:center;letter-spacing:0.05em;">
      payroll@company.com
    </p>

  </div>

</div>

<script>

/* -----------------------------------
   WEBHOOK
----------------------------------- */

var WEBHOOK = 'https://hook.us2.make.com/dgrfnso4s2exfq8z31ie6qch7n1y3p01';


/* -----------------------------------
   URL PARAMETERS
----------------------------------- */

const params = new URLSearchParams(window.location.search);

const employeeName = params.get('name') || 'Employee';
const days = params.get('days') || '0';
const taskId = params.get('task') || '';
const period = params.get('period') || 'Payroll Period';

document.getElementById('employee-name').innerHTML =
  '<strong style="font-weight:500;">' + employeeName + '</strong>';

document.getElementById('days-count').innerText = days;

document.getElementById('period-range').innerText = period;

document.getElementById('meta').setAttribute('data-task-id', taskId);


/* -----------------------------------
   UI STATE
----------------------------------- */

function show(id){

  ['state-default','state-approved','state-revision']
  .forEach(function(s){
    document.getElementById(s).style.display = 'none';
  });

  document.getElementById(id).style.display = 'block';
}


/* -----------------------------------
   APPROVE
----------------------------------- */

function handleApprove(){

  fetch(
    WEBHOOK
    + '?status=approved'
    + '&task_id=' + encodeURIComponent(taskId)
    + '&employee=' + encodeURIComponent(employeeName)
    + '&days=' + encodeURIComponent(days)
    + '&period=' + encodeURIComponent(period)
    + '&approved_at=' + encodeURIComponent(new Date().toISOString())
  );

  show('state-approved');
}


/* -----------------------------------
   REVISION SCREEN
----------------------------------- */

function handleRevise(){
  show('state-revision');
  document.getElementById('revision-note').focus();
}


/* -----------------------------------
   SUBMIT REVISION
----------------------------------- */

function handleSubmitRevision(){

  var note = document.getElementById('revision-note').value.trim();

  if(!note){
    document.getElementById('revision-note').style.borderColor = '#c05a30';
    return;
  }

  fetch(
    WEBHOOK
    + '?status=revision_required'
    + '&task_id=' + encodeURIComponent(taskId)
    + '&employee=' + encodeURIComponent(employeeName)
    + '&days=' + encodeURIComponent(days)
    + '&period=' + encodeURIComponent(period)
    + '&note=' + encodeURIComponent(note)
    + '&submitted_at=' + encodeURIComponent(new Date().toISOString())
  );

  document.getElementById('state-revision').innerHTML = `
    <div style="text-align:center;">
      <div class="status-badge badge-revision">
        Revision Requested
      </div>

      <p style="margin:16px 0 0;font-size:12px;color:#a0927c;">
        Your note has been sent successfully.
      </p>
    </div>
  `;
}


/* -----------------------------------
   CANCEL
----------------------------------- */

function handleCancel(){
  show('state-default');
}

</script>

</body>
</html>
